<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fuelvselectric – 100 km Kostenvergleich</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .app-bg {
        background: radial-gradient(circle at 10% 0%, #3156db 0%, #0c1638 36%, #07122f 100%);
      }

      .wheel-shell {
        position: relative;
        width: min(100%, 320px);
        aspect-ratio: 1 / 1;
        margin-inline: auto;
        border-radius: 9999px;
        cursor: grab;
        touch-action: none;
        user-select: none;
      }

      .wheel-shell:active {
        cursor: grabbing;
      }

      .wheel-ring {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        border: 9px solid var(--ring-color);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 24px 45px rgba(0, 0, 0, 0.45);
      }

      .wheel-inner {
        position: absolute;
        inset: 12px;
        border-radius: 9999px;
        background:
          radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.2), transparent 28%),
          radial-gradient(circle at 70% 75%, rgba(59, 130, 246, 0.15), transparent 35%),
          linear-gradient(160deg, #123757 0%, #081533 68%, #050b1e 100%);
      }

      .wheel-marker {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 18px;
        height: 18px;
        border-radius: 9999px;
        border: 3px solid white;
        box-shadow: 0 0 16px rgba(255, 255, 255, 0.6);
        transform: translate(-50%, -50%);
      }

      .wheel-content {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        z-index: 2;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="app-bg min-h-screen text-slate-100 p-4 sm:p-8">
    <main class="mx-auto w-full max-w-5xl rounded-3xl border border-slate-700/70 bg-slate-950/70 p-5 sm:p-8 shadow-2xl shadow-black/30">
      <h1 class="text-4xl font-extrabold tracking-tight">fuelvselectric</h1>
      <p class="mt-2 text-lg text-slate-300">Vergleiche, welcher Strompreis pro kWh dem gewählten Benzinpreis entspricht (und umgekehrt).</p>

      <section class="mt-6 grid gap-4 sm:grid-cols-2">
        <label class="rounded-2xl border border-slate-700 bg-slate-950/50 p-4">
          <span class="mb-2 block text-xl font-semibold text-slate-200">Benzin-Verbrauch (Liter / 100 km)</span>
          <input id="fuelConsumption" type="number" min="0" step="0.1" value="9" class="w-full rounded-xl border border-slate-600 bg-slate-900 px-4 py-3 text-2xl outline-none focus:border-blue-400" />
        </label>

        <label class="rounded-2xl border border-slate-700 bg-slate-950/50 p-4">
          <span class="mb-2 block text-xl font-semibold text-slate-200">Stromverbrauch (kWh / 100 km)</span>
          <input id="electricConsumption" type="number" min="0" step="0.1" value="24" class="w-full rounded-xl border border-slate-600 bg-slate-900 px-4 py-3 text-2xl outline-none focus:border-emerald-400" />
        </label>
      </section>

      <section class="mt-6 grid gap-4 lg:grid-cols-2">
        <article class="rounded-2xl border border-slate-700/90 bg-slate-950/40 p-5">
          <h2 class="text-center text-4xl font-bold text-slate-200">Benzinpreis pro Liter (€)</h2>
          <div class="mt-5">
            <div class="wheel-shell" id="fuelWheel" style="--ring-color: #2f91cc">
              <div class="wheel-ring"></div>
              <div class="wheel-inner"></div>
              <div class="wheel-marker bg-sky-300" id="fuelMarker"></div>
              <div class="wheel-content">
                <p class="text-7xl font-bold"><span id="fuelPriceLabel">1,70</span> €</p>
              </div>
            </div>
            <p class="mt-3 text-center text-xl text-sky-200">Drehen oder wischen</p>
          </div>
          <input id="fuelPrice" class="sr-only" type="range" min="0.8" max="3" step="0.01" value="1.7" />
        </article>

        <article class="rounded-2xl border border-slate-700/90 bg-slate-950/40 p-5">
          <h2 class="text-center text-4xl font-bold text-slate-200">Strompreis pro kWh (€)</h2>
          <div class="mt-5">
            <div class="wheel-shell" id="electricWheel" style="--ring-color: #1f9d82">
              <div class="wheel-ring"></div>
              <div class="wheel-inner"></div>
              <div class="wheel-marker bg-emerald-300" id="electricMarker"></div>
              <div class="wheel-content">
                <p class="text-7xl font-bold"><span id="electricPriceLabel">0,638</span> €</p>
              </div>
            </div>
            <p class="mt-3 text-center text-xl text-emerald-200">Drehen oder wischen</p>
          </div>
          <input id="electricPrice" class="sr-only" type="range" min="0.05" max="1.2" step="0.001" value="0.638" />
        </article>
      </section>

      <p id="result" class="mt-5 rounded-2xl border border-dashed border-slate-600 bg-slate-900/50 px-5 py-3 text-center text-2xl text-slate-200"></p>
    </main>

    <script>
      const fuelConsumptionEl = document.getElementById('fuelConsumption');
      const electricConsumptionEl = document.getElementById('electricConsumption');
      const fuelPriceEl = document.getElementById('fuelPrice');
      const electricPriceEl = document.getElementById('electricPrice');
      const fuelPriceLabel = document.getElementById('fuelPriceLabel');
      const electricPriceLabel = document.getElementById('electricPriceLabel');
      const fuelWheel = document.getElementById('fuelWheel');
      const electricWheel = document.getElementById('electricWheel');
      const fuelMarker = document.getElementById('fuelMarker');
      const electricMarker = document.getElementById('electricMarker');
      const resultEl = document.getElementById('result');

      const toNumber = (value, fallback) => {
        const parsed = Number(value);
        return Number.isFinite(parsed) && parsed >= 0 ? parsed : fallback;
      };
      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
      const format = (num, digits) => num.toLocaleString('de-DE', { minimumFractionDigits: digits, maximumFractionDigits: digits });

      function positionMarker(markerEl, wheelEl, rangeEl) {
        const value = Number(rangeEl.value);
        const min = Number(rangeEl.min);
        const max = Number(rangeEl.max);
        const ratio = max === min ? 0 : (value - min) / (max - min);
        const angle = ratio * Math.PI * 2 - Math.PI / 2;
        const radius = wheelEl.clientWidth / 2 - 10;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        markerEl.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
      }

      function setValueFromPointer(event, wheelEl, rangeEl, onInput) {
        const rect = wheelEl.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const angle = Math.atan2(event.clientY - centerY, event.clientX - centerX);
        let normalized = (angle + Math.PI / 2) / (Math.PI * 2);
        if (normalized < 0) normalized += 1;

        const min = Number(rangeEl.min);
        const max = Number(rangeEl.max);
        const step = Number(rangeEl.step) || 0.01;
        const raw = min + normalized * (max - min);
        const stepped = Math.round(raw / step) * step;
        rangeEl.value = String(clamp(stepped, min, max));
        onInput();
      }

      function setupWheel(wheelEl, rangeEl, onInput) {
        let dragging = false;

        wheelEl.addEventListener('pointerdown', (event) => {
          dragging = true;
          wheelEl.setPointerCapture(event.pointerId);
          setValueFromPointer(event, wheelEl, rangeEl, onInput);
        });

        wheelEl.addEventListener('pointermove', (event) => {
          if (!dragging) return;
          setValueFromPointer(event, wheelEl, rangeEl, onInput);
        });

        const stop = () => {
          dragging = false;
        };

        wheelEl.addEventListener('pointerup', stop);
        wheelEl.addEventListener('pointercancel', stop);
      }

      function render() {
        const fuelConsumption = toNumber(fuelConsumptionEl.value, 9);
        const electricConsumption = toNumber(electricConsumptionEl.value, 24);
        const fuelPrice = toNumber(fuelPriceEl.value, 1.7);
        const electricPrice = toNumber(electricPriceEl.value, 0.638);

        fuelPriceLabel.textContent = format(fuelPrice, 2);
        electricPriceLabel.textContent = format(electricPrice, 3);

        const costFuel = fuelConsumption * fuelPrice;
        const costElectric = electricConsumption * electricPrice;

        resultEl.textContent = `${format(fuelPrice, 2)} € / Liter bei ${format(fuelConsumption, 1)} l/100 km entspricht ${format(electricPrice, 3)} € / kWh bei ${format(electricConsumption, 1)} kWh/100 km. Kosten je 100 km: ${format(costFuel, 2)} €.`;

        positionMarker(fuelMarker, fuelWheel, fuelPriceEl);
        positionMarker(electricMarker, electricWheel, electricPriceEl);
      }

      function updateFromFuel() {
        const fuelConsumption = toNumber(fuelConsumptionEl.value, 9);
        const electricConsumption = toNumber(electricConsumptionEl.value, 24);
        const fuelPrice = toNumber(fuelPriceEl.value, 1.7);

        const equivalentElectric = electricConsumption > 0 ? (fuelConsumption * fuelPrice) / electricConsumption : 0;
        electricPriceEl.value = String(clamp(equivalentElectric, Number(electricPriceEl.min), Number(electricPriceEl.max)));
        render();
      }

      function updateFromElectric() {
        const fuelConsumption = toNumber(fuelConsumptionEl.value, 9);
        const electricConsumption = toNumber(electricConsumptionEl.value, 24);
        const electricPrice = toNumber(electricPriceEl.value, 0.638);

        const equivalentFuel = fuelConsumption > 0 ? (electricConsumption * electricPrice) / fuelConsumption : 0;
        fuelPriceEl.value = String(clamp(equivalentFuel, Number(fuelPriceEl.min), Number(fuelPriceEl.max)));
        render();
      }

      fuelConsumptionEl.addEventListener('input', updateFromFuel);
      electricConsumptionEl.addEventListener('input', updateFromFuel);
      fuelPriceEl.addEventListener('input', updateFromFuel);
      electricPriceEl.addEventListener('input', updateFromElectric);
      window.addEventListener('resize', render);

      setupWheel(fuelWheel, fuelPriceEl, updateFromFuel);
      setupWheel(electricWheel, electricPriceEl, updateFromElectric);

      updateFromFuel();
    </script>
  </body>
</html>
